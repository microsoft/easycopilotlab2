<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
<rect x="0" y="0" width="980" height="430" rx="20" fill="#fff" stroke="#E5E7EB" stroke-width="1.5"/>
<text x="40" y="48" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="22" font-weight="800" fill="#1F2430">4장 — 지침이 곧 실력: 막연함에서 좋은 지침으로</text>
