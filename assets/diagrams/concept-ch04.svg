<text x="100" y="193" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="16" font-weight="600" fill="#5B6472" text-anchor="start">"프로젝트 잘 도와줘"</text>
<text x="84" y="250" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="500" fill="#9AA0A6" text-anchor="start">→ 무엇을, 어디까지, 모르면?</text>
<text x="84" y="278" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="500" fill="#9AA0A6" text-anchor="start">→ 코봇이 추측하거나 헤맨다</text>
<defs><marker id="ah660" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563EB"/></marker></defs><line x1="430" y1="230" x2="505" y2="230" stroke="#2563EB" stroke-width="3" marker-end="url(#ah660)"/>
<rect x="520" y="100" width="400" height="260" rx="16" fill="#EFF4FF" stroke="#2563EB" stroke-width="2" />
<text x="540" y="134" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="15" font-weight="800" fill="#2563EB" text-anchor="start">AFTER — 좋은 지침 4요소</text>
<rect x="542" y="158" width="356" height="42" rx="10" fill="#fff" stroke="#2563EB" stroke-width="2" />
<text x="554" y="185" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="800" fill="#2563EB" text-anchor="start">역할</text>
<text x="612" y="185" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="500" fill="#1F2430" text-anchor="start">여름 신제품 출시 프로젝트의 PM</text>
<rect x="542" y="206" width="356" height="42" rx="10" fill="#fff" stroke="#2563EB" stroke-width="2" />
<text x="554" y="233" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="800" fill="#2563EB" text-anchor="start">범위</text>
<text x="612" y="233" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="500" fill="#1F2430" text-anchor="start">기획→일정→예산→리스크→보고 / 회계·법무 제외</text>
