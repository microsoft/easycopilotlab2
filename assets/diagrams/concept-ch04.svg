<text x="554" y="281" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="800" fill="#2563EB" text-anchor="start">태도</text>
<text x="612" y="281" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="500" fill="#1F2430" text-anchor="start">근거를 인용하고 산출물은 정해진 양식으로</text>
<rect x="542" y="302" width="356" height="42" rx="10" fill="#fff" stroke="#2563EB" stroke-width="2" />
<text x="554" y="329" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="13.5" font-weight="800" fill="#2563EB" text-anchor="start">원칙</text>
<text x="612" y="329" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="500" fill="#1F2430" text-anchor="start">모르면 추측 말고 담당자에게 연결</text>
