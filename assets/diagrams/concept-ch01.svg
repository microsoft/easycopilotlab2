<text x="104" y="196" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="15" font-weight="600" fill="#5B6472" text-anchor="start">"무엇을 도와드릴까요?"</text>
<defs><marker id="ah522" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/></marker></defs><line x1="260" y1="228" x2="260" y2="262" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah522)"/>
