<text x="40" y="48" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="22" font-weight="800" fill="#1F2430">1장 — 챗봇 vs 에이전트: 같은 한 마디, 다른 결과</text>
<text x="490.0" y="86" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="16" font-weight="700" fill="#1F2430" text-anchor="middle">사용자: "여름 신제품 출시 프로젝트, 시작해줘"</text>
