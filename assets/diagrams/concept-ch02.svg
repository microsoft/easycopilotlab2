<text x="490.0" y="438" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="700" fill="#1F2430" text-anchor="middle">두 경험은 공존하되 서로 이주하지 않는다 — 무엇을 어디서 시작할지가 첫 결정</text>
