<text x="462" y="174" font-family="'Malgun Gothic','Segoe UI','Apple SD Gothic Neo',sans-serif" font-size="12.5" font-weight="500" fill="#1F2430" text-anchor="start">• 향상된 오케스트레이션 항상 ON</text>
